<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Soccer xG — drag the players</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Expected Goals <span class="accent">(xG)</span></h1>
      <p>Drag the players around the box and the model re-scores the shot live. Attack is to the right.</p>
    </header>

    <main>
      <!-- viewBox IS the pitch coordinate system (StatsBomb 120x80, attacking
           half shown). SVG user units == pitch units, so dragging yields model
           coordinates directly. -->
      <div class="pitch-wrap">
        <svg id="pitch" viewBox="58 -3 64 86" preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id="grass-glow" cx="100%" cy="50%" r="90%">
              <stop offset="0%" stop-color="#2aa055" />
              <stop offset="100%" stop-color="#177539" />
            </radialGradient>
          </defs>

          <rect x="60" y="0" width="60" height="80" fill="url(#grass-glow)" />
          <g class="stripes">
            <rect x="70"  y="0" width="10" height="80" />
            <rect x="90"  y="0" width="10" height="80" />
            <rect x="110" y="0" width="10" height="80" />
          </g>

          <!-- markings -->
          <rect x="60" y="0" width="60" height="80" class="line" fill="none" />
          <rect x="102" y="18" width="18" height="44" class="line" fill="none" />
          <rect x="114" y="30" width="6" height="20" class="line" fill="none" />
          <path d="M 102 32 A 10 10 0 0 0 102 48" class="line" fill="none" />
          <circle cx="108" cy="40" r="0.5" class="spot" />
          <circle cx="60" cy="40" r="10" class="line" fill="none" />
          <line x1="60" y1="0" x2="60" y2="80" class="line" />
          <line x1="120" y1="36" x2="120" y2="44" class="goal" />
          <g id="markers"></g>
        </svg>
      </div>

      <aside id="panel">
        <div class="xg-box">
          <div class="xg-label">EXPECTED GOALS</div>
          <div id="xg-value">—</div>
          <div id="xg-pct" class="xg-pct">&nbsp;</div>
          <div class="bar"><div id="xg-bar"></div></div>
        </div>

        <div class="legend">
          <span><i class="dot shooter"></i> shooter / ball</span>
          <span><i class="dot att"></i> attacker</span>
          <span><i class="dot def"></i> defender</span>
          <span><i class="dot gk"></i> goalkeeper</span>
        </div>

        <div class="controls">
          <button id="add-att">+ attacker</button>
          <button id="add-def">+ defender</button>
          <button id="reset" class="ghost">reset</button>
        </div>

        <p id="status" class="status">&nbsp;</p>
      </aside>
    </main>
  </div>

  <script src="pitch.js"></script>
</body>
</html>
